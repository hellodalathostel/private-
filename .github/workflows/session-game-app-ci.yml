name: Session Game App CI

on:
  push:
    branches: [main]
    paths:
      - 'session-game-app/**'
      - '.github/workflows/session-game-app-ci.yml'
  pull_request:
    paths:
      - 'session-game-app/**'
      - '.github/workflows/session-game-app-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: session-game-app-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: session-game-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: session-game-app/package.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
